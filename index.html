<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- PWA -->
    <meta name="theme-color" content="#FAFAF8" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA — critical for standalone mode -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Mochi" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- SEO -->
    <meta name="description" content="Mochi — ứng dụng quản lý chi tiêu cá nhân, ghi chép nhanh gọn, theo dõi ngân sách hằng ngày" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />

    <title>Mochi</title>

    <style>
      /* Home sections stagger-in animation */
      .animate-slide-up {
        animation: slideUp 360ms cubic-bezier(0.22, 1, 0.36, 1) both;
        will-change: transform, opacity;
      }

      .delay-1 { animation-delay: 40ms; }
      .delay-2 { animation-delay: 80ms; }
      .delay-3 { animation-delay: 120ms; }
      .delay-4 { animation-delay: 160ms; }
      .delay-5 { animation-delay: 200ms; }

      /* Performance optimization for scrollable content */
      .content-visibility-auto {
        content-visibility: auto;
        contain-intrinsic-size: 1px 160px; /* Placeholder size for LCP */
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
